name: Crypto Bot Prova

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  controlla:
    runs-on: ubuntu-latest
    steps:
      - name: Scarica il codice del repository
        uses: actions/checkout@v4

      - name: Prepara Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installa le librerie necessarie
        run: pip install pandas requests

      - name: Esegui un controllo del bot
        run: python crypto_bot_prova_live.py

      - name: Salva lo stato aggiornato nel repository
        run: |
          git config user.name "crypto-bot"
          git config user.email "crypto-bot@users.noreply.github.com"
          git add dashboard_data.json posizioni.json # FIX QUI
          git diff --staged --quiet || git commit -m "Aggiorna stato bot"
          git push
