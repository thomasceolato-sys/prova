name: Crypto Bot Prova

# Fa partire il bot ogni 15 minuti, in automatico.
# "workflow_dispatch" aggiunge anche un pulsante per farlo partire a mano,
# utile per il primo test senza dover aspettare.
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

# Serve per permettere al bot di salvare lo stato aggiornato nel repository
permissions:
  contents: write

jobs:
  controlla:
    runs-on: ubuntu-latest
    steps:
      - name: Scarica il codice del repository
        uses: actions/checkout@v4

      - name: Prepara Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installa le librerie necessarie
        run: pip install ccxt pandas requests

      - name: Esegui un controllo del bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python crypto_bot_prova_live.py

      - name: Salva lo stato aggiornato nel repository
        run: |
          git config user.name "crypto-bot"
          git config user.email "crypto-bot@users.noreply.github.com"
          git add stato_bot.json
          git diff --staged --quiet || git commit -m "Aggiorna stato bot"
          git push
